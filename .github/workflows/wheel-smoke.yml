# Wheel smoke test — proves `pip install amatelier` works end-to-end.
#
# Runs on every push and PR. Builds the wheel, installs it into a fresh
# venv inside an Ubuntu container, and exercises the CLI + package imports.
#
# This is the test that should have existed from day 0 — it would have
# caught the google-generativeai vs google-genai dependency mistake and
# the missing main() refactor immediately.
#
# Does NOT hit live Claude/Gemini APIs — that would require real secrets.
# Proves:
#   - Wheel builds cleanly with hatchling
#   - All expected files are included (engine/, agents/, config.json, etc.)
#   - `pip install` resolves all deps from PyPI
#   - `import amatelier` works from site-packages
#   - CLI entry point is registered
#   - All four subcommands (roundtable/therapist/analytics/watch) dispatch
#   - config.json loads from its post-install location

name: Wheel smoke test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  wheel-install:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build sdist + wheel
        run: python -m build

      - name: Inspect wheel contents — expected files present
        run: |
          echo "=== checking required files ==="
          for expected in \
            "amatelier/__init__.py" \
            "amatelier/cli.py" \
            "amatelier/paths.py" \
            "amatelier/llm_backend.py" \
            "amatelier/config.json" \
            "amatelier/engine/roundtable_runner.py" \
            "amatelier/engine/gemini_client.py" \
            "amatelier/agents/elena/CLAUDE.md" \
            "amatelier/store/catalog.json" \
            "amatelier/roundtable-server/db_client.py" \
            "amatelier/docs/index.md" \
            "amatelier/docs/guides/install.md" \
            "amatelier/docs/reference/protocols/roundtable.md"
          do
            if python -m zipfile -l dist/amatelier-*.whl | grep -q "$expected"; then
              echo "  [OK] $expected"
            else
              echo "  [--] MISSING: $expected"
              exit 1
            fi
          done

      - name: Inspect wheel — clone-only paths must NOT ship
        run: |
          echo "=== checking excluded paths ==="
          for forbidden in \
            "examples/" \
            "tests/" \
            "scripts/regen_llm.py" \
            ".github/workflows" \
            "llm/SPEC.md"
          do
            if python -m zipfile -l dist/amatelier-*.whl | grep -q "$forbidden"; then
              echo "  [--] LEAK: $forbidden should not be in the wheel"
              exit 1
            else
              echo "  [OK] excluded: $forbidden"
            fi
          done

      - name: Install wheel into fresh venv
        run: |
          python -m venv /tmp/amatelier-venv
          /tmp/amatelier-venv/bin/pip install --upgrade pip
          /tmp/amatelier-venv/bin/pip install dist/amatelier-*.whl

      - name: Verify import
        run: |
          /tmp/amatelier-venv/bin/python -c "
          import amatelier
          assert amatelier.__version__ == '0.2.0', f'unexpected version: {amatelier.__version__}'
          print('[OK] import amatelier (version', amatelier.__version__, ')')
          print('  AMATELIER_ROOT:', amatelier.AMATELIER_ROOT)
          from amatelier import paths, llm_backend
          print('  user_data_dir:', paths.user_data_dir())
          print('  bundled_docs_dir:', paths.bundled_docs_dir())
          assert paths.bundled_docs_dir().exists(), 'bundled docs did not ship'
          print('[OK] bundled docs accessible')
          "

      - name: Verify config.json ships and loads
        run: |
          /tmp/amatelier-venv/bin/python -c "
          import json
          from amatelier import AMATELIER_ROOT
          cfg = AMATELIER_ROOT / 'config.json'
          assert cfg.exists(), f'config.json missing at {cfg}'
          data = json.loads(cfg.read_text())
          assert data['version'] == '0.2.0', f'unexpected version: {data[\"version\"]}'
          workers = list(data['team']['workers'].keys())
          assert set(workers) == {'elena', 'marcus', 'clare', 'simon', 'naomi'}, \
              f'unexpected workers: {workers}'
          assert 'llm' in data, 'config.json missing llm section (0.2.0)'
          print('[OK] config.json v0.2.0 loaded,', len(workers), 'workers configured')
          "

      - name: CLI --version
        run: |
          out=$(/tmp/amatelier-venv/bin/amatelier --version)
          [ "$out" = "0.2.0" ] || { echo "unexpected version: $out"; exit 1; }
          echo "[OK] amatelier --version = $out"

      - name: CLI --help
        run: |
          /tmp/amatelier-venv/bin/amatelier --help 2>&1 | tee /tmp/help.out
          grep -q "roundtable" /tmp/help.out || { echo "help missing 'roundtable'"; exit 1; }
          echo "[OK] amatelier --help mentions all subcommands"

      - name: Dispatch — roundtable --help
        run: |
          /tmp/amatelier-venv/bin/amatelier roundtable --help 2>&1 | tee /tmp/rt.out || true
          grep -q -- "--topic" /tmp/rt.out || { echo "roundtable --help didn't reach engine"; exit 1; }
          echo "[OK] amatelier roundtable dispatches to engine/roundtable_runner.py"

      - name: Dispatch — therapist --help
        run: |
          /tmp/amatelier-venv/bin/amatelier therapist --help 2>&1 | tee /tmp/th.out || true
          grep -q -- "--digest" /tmp/th.out || { echo "therapist --help didn't reach engine"; exit 1; }
          echo "[OK] amatelier therapist dispatches to engine/therapist.py"

      - name: Dispatch — analytics --help
        run: |
          /tmp/amatelier-venv/bin/amatelier analytics --help 2>&1 | tee /tmp/an.out || true
          grep -q "report\|trends\|economy" /tmp/an.out || { echo "analytics --help didn't reach engine"; exit 1; }
          echo "[OK] amatelier analytics dispatches to engine/analytics.py"

      - name: Unknown command produces usage
        run: |
          /tmp/amatelier-venv/bin/amatelier bogus-cmd 2>&1 | tee /tmp/bogus.out || true
          grep -q "unknown command" /tmp/bogus.out || { echo "unknown-command handling broken"; exit 1; }
          echo "[OK] unknown command produces 'unknown command' message"

      - name: docs subcommand — no args lists topics
        run: |
          /tmp/amatelier-venv/bin/amatelier docs 2>&1 | tee /tmp/docs.out
          grep -q "tutorials/" /tmp/docs.out || { echo "docs listing missing tutorials"; exit 1; }
          grep -q "guides/" /tmp/docs.out || { echo "docs listing missing guides"; exit 1; }
          grep -q "reference/" /tmp/docs.out || { echo "docs listing missing reference"; exit 1; }
          echo "[OK] amatelier docs lists all tiers"

      - name: docs subcommand — specific topic prints content
        run: |
          /tmp/amatelier-venv/bin/amatelier docs guides/install 2>&1 | tee /tmp/install.out
          grep -q "Install" /tmp/install.out || { echo "docs topic did not print"; exit 1; }
          echo "[OK] amatelier docs guides/install prints markdown"

      - name: config subcommand — shows mode + paths
        run: |
          # Force open mode since the container has no claude CLI
          export ANTHROPIC_API_KEY="sk-ant-dummy-key-for-test-only"
          /tmp/amatelier-venv/bin/amatelier config 2>&1 | tee /tmp/config.out || true
          grep -q "active mode" /tmp/config.out || { echo "config missing mode"; exit 1; }
          grep -q "bundled_assets_dir" /tmp/config.out || { echo "config missing paths"; exit 1; }
          echo "[OK] amatelier config shows mode and paths"

      - name: user_data_dir created on bootstrap
        run: |
          /tmp/amatelier-venv/bin/python -c "
          from amatelier import paths
          udir = paths.user_data_dir()
          # Sentinel from ensure_user_data() at package import
          assert (udir / '.bootstrap-complete').exists(), f'bootstrap sentinel missing at {udir}'
          assert (udir / 'roundtable-server' / 'logs').exists(), 'logs dir missing'
          assert (udir / 'agents').exists(), 'agents dir missing'
          assert (udir / 'store' / 'ledger.json').exists(), 'ledger.json missing'
          print('[OK] user_data_dir bootstrap complete at', udir)
          "

      - name: Open-mode backend detection (ANTHROPIC_API_KEY)
        run: |
          export ANTHROPIC_API_KEY="sk-ant-dummy-key-for-test-only"
          unset OPENAI_API_KEY OPENROUTER_API_KEY
          /tmp/amatelier-venv/bin/python -c "
          import os
          from amatelier import llm_backend
          env = llm_backend.describe_environment()
          assert env['anthropic-sdk']['available'] == True
          # No claude binary in container, so active should be anthropic-sdk
          assert env['active_mode'] == 'anthropic-sdk', f'active_mode={env[\"active_mode\"]}'
          print('[OK] anthropic-sdk mode auto-detected')
          "

      - name: Summary
        run: |
          echo ""
          echo "============================================================="
          echo "  ALL CHECKS PASSED on Python ${{ matrix.python-version }}"
          echo "  amatelier v0.2.0 is pip-install-ready"
          echo "  Verified: dual-layer paths, open mode, bundled docs,"
          echo "            examples excluded, CLI subcommands"
          echo "============================================================="
