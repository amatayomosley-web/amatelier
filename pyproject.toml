[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "amatelier"
version = "0.1.0"
description = "A self-evolving multi-model AI team skill for Claude Code"
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.10"
authors = [{ name = "Maximillian" }]
keywords = []
classifiers = [
  "Development Status :: 3 - Alpha",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
]
dependencies = [
  "google-generativeai>=1.51.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
  "pytest-cov>=5.0",
  "ruff>=0.6",
  "mypy>=1.10",
]

[project.urls]
Homepage = "https://github.com/amatayomosley-web/amatelier"
Issues = "https://github.com/amatayomosley-web/amatelier/issues"
Changelog = "https://github.com/amatayomosley-web/amatelier/blob/main/CHANGELOG.md"

[project.scripts]
amatelier = "amatelier.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/amatelier"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra --strict-markers"

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.mypy]
strict = true
python_version = "3.10"
